[pytest]
# Pytest configuration for CogniLex Backend

# Minimum version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests
    routes: Route/endpoint tests
    slow: Slow running tests
    admin: Admin-related tests
    user: User-related tests
    lawyer: Lawyer-related tests
    appointment: Appointment-related tests
    chat: Chat-related tests
    feedback: Feedback-related tests
    message: Message-related tests

# Test paths
testpaths = tests

# Timeout for tests (in seconds)
timeout = 300

# Coverage options
[coverage:run]
source = .
omit =
    */tests/*
    */__pycache__/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

